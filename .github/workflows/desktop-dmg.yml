name: Build Prefrontal Desktop (.dmg)

# Builds the macOS Electron app into .dmg installers.
#
#   • Run it on demand:  Actions tab → "Build Prefrontal Desktop (.dmg)" → Run
#     workflow. When it finishes, download the DMGs from the run's Artifacts.
#   • Or push a tag like `desktop-v0.1.0` to also attach them to a GitHub Release.
#
# The build is UNSIGNED (no Apple Developer cert). On first launch macOS
# Gatekeeper will block it — right-click the app → Open (once), or run
# `xattr -dr com.apple.quarantine /Applications/Prefrontal.app`.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    runs-on: macos-14 # Apple Silicon runner; cross-builds the x64 DMG too
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      # No lockfile is committed, so fall back to `npm install` if `npm ci` can't run.
      - name: Install dependencies
        run: npm ci || npm install

      - name: Build DMGs
        env:
          # Unsigned build: don't let electron-builder try to auto-discover a
          # signing identity (there isn't one on the runner).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist

      - name: Upload DMGs as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prefrontal-desktop-dmg
          path: desktop/dist/*.dmg
          if-no-files-found: error

      - name: Attach DMGs to Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.dmg
