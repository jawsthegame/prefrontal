name: CI

# Lint + test gate for the Python package. Mirrors the commands CONTRIBUTING.md
# asks contributors to run before opening a PR (`ruff check .` and `pytest`), so
# what's green locally is what's green here. Runs on every push and PR.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

concurrency:
  # One in-flight run per ref; a new push cancels the previous run.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The floor (py310, the ruff target-version) and a current interpreter.
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (package + dev tooling)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q
