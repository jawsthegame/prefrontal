name: iOS

# Lint + compile gate for the Swift app under ios/. Separate from the Python CI
# (ci.yml) and pinned to a macOS runner, so it only runs when iOS sources or
# this workflow change — Python-only PRs don't spend macOS minutes.
#
# Scope: SwiftLint (non-strict — only error-severity fails; see
# ios/.swiftlint.yml), the lightweight `swiftc -typecheck` compile check
# documented in ios/README.md (fast early signal, app + widget), and the
# XCTest unit-test target run via `xcodebuild test` on a simulator (#602).

on:
  push:
    branches: ["**"]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch: {}

# Least-privilege token: this job only reads the checkout.
permissions:
  contents: read

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint + XcodeGen
        run: brew install swiftlint xcodegen

      - name: Lint (SwiftLint)
        working-directory: ios
        # Non-strict: warnings annotate but don't fail; only error-severity rules
        # gate. Tighten to `--strict` once a clean baseline is confirmed.
        run: swiftlint lint --reporter github-actions-logging

      - name: Compile check — app target (swiftc -typecheck)
        working-directory: ios
        # The no-build sanity check from ios/README.md: typecheck the app target's
        # sources against the iOS 17 SDK. Catches build-breaking changes without
        # the CoreSimulator install a full xcodebuild needs.
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          find Prefrontal -name '*.swift' -print0 \
            | xargs -0 xcrun swiftc -sdk "$SDK" -target arm64-apple-ios17.0 -typecheck

      - name: Compile check — widget extension (swiftc -typecheck)
        working-directory: ios
        # The widget target's sources per project.yml: the widget dir plus the
        # shared app sources it compiles in (Config / Networking / Models / Theme
        # and the two shared intent files — NOT AppShortcuts.swift, which is
        # app-only). Keeps widget-only breakage from passing CI green.
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          find PrefrontalWidgets Prefrontal/Config Prefrontal/Networking \
               Prefrontal/Models Prefrontal/Theme -name '*.swift' -print0 \
            | xargs -0 xcrun swiftc -sdk "$SDK" -target arm64-apple-ios17.0 -typecheck \
                Prefrontal/Intents/WidgetActionIntents.swift \
                Prefrontal/Intents/PrefrontalIntents.swift

      - name: Unit tests (xcodebuild test on a simulator)
        working-directory: ios
        # Generate the Xcode project from project.yml, pick any available iPhone
        # simulator by UDID (robust to Xcode's device-name churn across runner
        # images), and run the PrefrontalTests bundle. A simulator unit-test run
        # needs no code signing (CODE_SIGNING_ALLOWED=NO).
        run: |
          set -euo pipefail
          xcodegen generate
          UDID=$(xcrun simctl list devices available \
            | grep -m1 'iPhone' | grep -oiE '[0-9a-f-]{36}' | head -1)
          if [ -z "$UDID" ]; then
            echo 'No iPhone simulator available on this runner:' >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Testing on simulator $UDID"
          xcodebuild test \
            -project Prefrontal.xcodeproj \
            -scheme Prefrontal \
            -destination "id=$UDID" \
            CODE_SIGNING_ALLOWED=NO
