name: iOS

# Lint + compile gate for the Swift app under ios/. Separate from the Python CI
# (ci.yml) and pinned to a macOS runner, so it only runs when iOS sources or
# this workflow change — Python-only PRs don't spend macOS minutes.
#
# Scope: SwiftLint (non-strict — only error-severity fails; see
# ios/.swiftlint.yml), the lightweight `swiftc -typecheck` compile check
# documented in ios/README.md (fast early signal, app + widget), and the
# XCTest unit-test target run via `xcodebuild test` on a simulator (#602).

on:
  push:
    branches: ["**"]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch: {}

# Least-privilege token: this job only reads the checkout.
permissions:
  contents: read

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check entitlements files in sync
        working-directory: ios
        # Prefrontal.push.entitlements (paid-tier, native APNs) must equal
        # Prefrontal.entitlements (base default, no APNs) plus exactly the
        # `aps-environment` key. Fail fast if they drift — e.g. an App Group added
        # to one only would silently drop it from the other's build. Pure Python,
        # so it needs no brew install and runs before the slower steps.
        run: ./scripts/check-entitlements-sync.sh

      - name: Install SwiftLint + XcodeGen
        run: brew install swiftlint xcodegen

      - name: Lint (SwiftLint)
        working-directory: ios
        # Non-strict: warnings annotate but don't fail; only error-severity rules
        # gate. Tighten to `--strict` once a clean baseline is confirmed.
        run: swiftlint lint --reporter github-actions-logging

      - name: Compile check — app target (swiftc -typecheck)
        working-directory: ios
        # The no-build sanity check from ios/README.md: typecheck the app target's
        # sources against the iOS 26 deployment target (the app's floor — see
        # project.yml). Catches build-breaking changes without the CoreSimulator
        # install a full xcodebuild needs.
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          find Prefrontal -name '*.swift' -print0 \
            | xargs -0 xcrun swiftc -sdk "$SDK" -target arm64-apple-ios26.0 -typecheck

      - name: Compile check — widget extension (swiftc -typecheck)
        working-directory: ios
        # The widget target's sources per project.yml: the widget dir plus the
        # shared app sources it compiles in (Config / Networking / Models / Theme
        # and the two shared intent files — NOT AppShortcuts.swift, which is
        # app-only). Keeps widget-only breakage from passing CI green.
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          find PrefrontalWidgets Prefrontal/Config Prefrontal/Networking \
               Prefrontal/Models Prefrontal/Theme -name '*.swift' -print0 \
            | xargs -0 xcrun swiftc -sdk "$SDK" -target arm64-apple-ios26.0 -typecheck \
                Prefrontal/Intents/WidgetActionIntents.swift \
                Prefrontal/Intents/PrefrontalIntents.swift

      - name: Compile check — watchOS companion (swiftc -typecheck)
        working-directory: ios
        # Typecheck the watch app and its complication extension against the
        # watchOS SDK. Each has its own @main, so they're typechecked in separate
        # invocations (same reason the app/widget checks above are split). Both
        # reuse the phone's Models + the shared Watch/WatchProtocol.swift.
        run: |
          SDK=$(xcrun --sdk watchos --show-sdk-path)
          # Only Models.swift from Models/ — SessionActivity.swift imports
          # ActivityKit, which watchOS doesn't have.
          find PrefrontalWatch -name '*.swift' -print0 \
            | xargs -0 xcrun swiftc -sdk "$SDK" -target arm64-apple-watchos10.0 -typecheck \
                Prefrontal/Models/Models.swift Prefrontal/Watch/WatchProtocol.swift
          find PrefrontalWatchWidgets -name '*.swift' -print0 \
            | xargs -0 xcrun swiftc -sdk "$SDK" -target arm64-apple-watchos10.0 -typecheck \
                Prefrontal/Models/Models.swift Prefrontal/Watch/WatchProtocol.swift

      - name: Unit tests (xcodebuild test on a simulator)
        working-directory: ios
        # Generate the Xcode project from project.yml, pick any available iPhone
        # simulator by UDID (robust to Xcode's device-name churn across runner
        # images), and run the PrefrontalTests bundle. A simulator unit-test run
        # needs no code signing (CODE_SIGNING_ALLOWED=NO).
        run: |
          set -euo pipefail
          xcodegen generate
          # `|| true`: under `set -e` a no-match grep would abort the step before
          # the empty-UDID check below could print the helpful device list.
          UDID=$(xcrun simctl list devices available \
            | grep -m1 'iPhone' | grep -oiE '[0-9a-f-]{36}' | head -1 || true)
          if [ -z "$UDID" ]; then
            echo 'No iPhone simulator available on this runner:' >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Testing on simulator $UDID"
          xcodebuild test \
            -project Prefrontal.xcodeproj \
            -scheme Prefrontal \
            -destination "id=$UDID" \
            CODE_SIGNING_ALLOWED=NO
