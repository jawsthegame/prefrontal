<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>Prefrontal — Monitor</title>
<style>
  :root {
    --bg: #0f1115; --card: #181b22; --line: #262b36; --fg: #e6e9ef;
    --muted: #8b93a7; --accent: #6ea8fe; --good: #5bc97a;
    --none: #6b7280; --soft: #d9a93b; --firm: #e07b39; --call: #e0556b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  header {
    display: flex; align-items: baseline; gap: 10px 12px; flex-wrap: wrap;
    padding: 14px 20px; padding-top: max(14px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--line); position: sticky; top: 0;
    background: rgba(15,17,21,.92); backdrop-filter: blur(8px); z-index: 5;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .2px; }
  header .meta { color: var(--muted); font-size: 13px; }
  header .spacer { flex: 1; }
  button { font-family: inherit; }
  button:disabled { opacity: .5; cursor: progress; }
  .ghost {
    background: var(--card); color: var(--fg); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 13px; min-height: 36px;
  }
  .ghost:hover { border-color: var(--accent); }

  .banner { padding: 16px 20px 0; max-width: 1400px; margin: 0 auto; }
  .masonry {
    columns: 360px; column-gap: 16px; padding: 16px 20px 28px;
    max-width: 1400px; margin: 0 auto;
  }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 18px; margin: 0 0 16px; break-inside: avoid;
  }
  .banner .card { margin-bottom: 0; }
  .card h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); margin: 0 0 12px;
  }
  .empty { color: var(--muted); font-style: italic; }

  .row { display: flex; align-items: flex-start; gap: 10px; padding: 11px 0; border-top: 1px solid var(--line); }
  .row:first-of-type { border-top: none; }
  .row .main { flex: 1; min-width: 0; }
  .row .acts { display: flex; gap: 6px; flex-shrink: 0; }
  .row .title { font-weight: 600; }
  .row .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

  .badge { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase;
           padding: 2px 8px; border-radius: 999px; letter-spacing: .4px; vertical-align: middle; }
  .lvl-none { background: #2a2f3a; color: var(--none); }
  .lvl-soft { background: #3a2f12; color: var(--soft); }
  .lvl-firm { background: #3a2412; color: var(--firm); }
  .lvl-call { background: #3a1620; color: var(--call); }
  .pill { font-size: 11px; padding: 1px 7px; border-radius: 6px; background: #2a2f3a; color: var(--muted); }
  .pill.fyi { background: #1e2a3a; color: #8ab4d8; }
  /* Account/calendar pill: names the mail inbox a todo came from, or the
     calendar a commitment belongs to. Solid color + dark text so a bright
     configured color (orange, magenta, blue) reads clearly. */
  .pill.acct, .pill.cal { font-weight: 700; color: #0b0d12; }
  /* Category chip: clickable (a button), colored by a hash of its label. The
     "none" variant is the muted "+ category" affordance on an uncategorized todo. */
  .pill.cat { font-weight: 700; color: #fff; border: none; cursor: pointer; }
  .pill.cat.none { background: transparent; color: var(--muted); border: 1px dashed #3a4150; font-weight: 400; }
  .pill.cat:hover { filter: brightness(1.15); }
  .catlead { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  /* The exact text appended to the triage prompt on the next sync — the concrete
     impact your drops have on what mail gets flagged. */
  .addendum { white-space: pre-wrap; word-break: break-word; margin: 6px 0 0;
    padding: 8px 10px; background: #1d212b; border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0; font: 12px/1.5 inherit; color: var(--fg); }
  .subhead { color: var(--muted); font-size: 12px; text-transform: uppercase;
    letter-spacing: .4px; margin: 2px 0 4px; }
  .src { font-size: 12px; text-decoration: none; color: var(--muted); padding: 0 3px; }
  .src:hover { color: var(--accent); }
  .pri-3 { background: #3a1620; color: var(--call); }
  .pri-2 { background: #3a2412; color: var(--firm); }
  .conflict { background: #3a1620; color: var(--call); }
  .possible { background: #3a2f12; color: var(--soft); }
  .avoiding { background: #3a1620; color: var(--call); }
  .badge.first { background: #16341f; color: var(--good); }
  .firststep { margin-top: 8px; padding: 8px 10px; background: #15231a;
               border-left: 3px solid var(--good); border-radius: 0 6px 6px 0; font-size: 14px; }
  .steps { margin-top: 6px; }
  .steps summary { color: var(--muted); font-size: 13px; cursor: pointer; }
  .steplist { list-style: none; margin: 6px 0 0; padding-left: 2px; }
  .steplist li { margin: 4px 0; font-size: 13px; color: var(--muted); display: flex; align-items: flex-start; gap: 7px; }
  /* A step's check CTA: an empty circle that fills with a tick when done. */
  .step-check { flex: none; width: 18px; height: 18px; margin-top: 1px; padding: 0;
    border: 1.5px solid var(--line); border-radius: 50%; background: transparent;
    color: var(--good); font-size: 11px; line-height: 1; cursor: pointer; }
  .step-check:hover { border-color: var(--good); }
  .step-check.on { background: var(--good); border-color: var(--good); color: #0b0d12; }
  .firststep.step { display: flex; align-items: flex-start; gap: 7px; }
  .firststep .step-check { margin-top: 2px; }
  .step-done { opacity: .55; }
  .step-done .steptext { text-decoration: line-through; }
  .lnk { background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 12px; padding: 0; text-decoration: underline; opacity: .75; }
  .lnk:hover { color: var(--accent); opacity: 1; }

  .bar { height: 6px; border-radius: 4px; background: #2a2f3a; margin-top: 8px; overflow: hidden; }
  .bar > span { display: block; height: 100%; }

  .btn-sm {
    font-size: 12px; padding: 0 11px; min-height: 34px; border-radius: 8px;
    background: #222734; border: 1px solid var(--line); color: var(--muted); cursor: pointer;
  }
  .btn-go:hover { border-color: var(--good); color: var(--good); }
  .btn-x:hover { border-color: var(--call); color: var(--call); }

  .addrow { display: flex; gap: 8px; margin-bottom: 12px; }
  .addrow input {
    flex: 1; min-width: 0; padding: 9px 11px; border-radius: 8px; min-height: 38px;
    border: 1px solid var(--line); background: var(--bg); color: var(--fg); font-size: 15px;
  }
  .addrow select {
    padding: 0 8px; min-height: 38px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--bg); color: var(--fg); font-size: 14px;
  }
  .addrow .add {
    padding: 0 16px; min-height: 38px; border-radius: 8px; background: var(--accent);
    color: #0b0d12; border: none; font-weight: 700; cursor: pointer;
  }

  /* lightweight markdown */
  .md h3 { font-size: 14px; margin: 14px 0 6px; }
  .md h4 { font-size: 12px; margin: 12px 0 4px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .md p { margin: 6px 0; }
  .md ul { margin: 6px 0; padding-left: 20px; }
  .md li { margin: 2px 0; }
  .md em { color: var(--muted); font-style: normal; opacity: .8; }
  .md code { background: #2a2f3a; padding: 1px 5px; border-radius: 5px; font-size: 12px; }
  .md blockquote { margin: 8px 0; padding: 6px 10px; border-left: 3px solid var(--accent);
                   background: #1d212b; color: var(--muted); border-radius: 0 6px 6px 0; }
  details summary { cursor: pointer; color: var(--muted); margin-bottom: 8px; }
  .card > details.collapse > summary { margin-bottom: 0; list-style-position: inside; }
  .card > details.collapse[open] > summary { margin-bottom: 12px; }
  .card > details.collapse > summary h2 { display: inline; margin: 0; }
  .card > details.collapse > summary .updated {
    font-size: 11px; color: var(--muted); text-transform: none; letter-spacing: 0; margin-left: 6px;
  }
  .err { color: var(--call); font-size: 13px; }

  /* dashboard assistant — natural-language edits with a review-then-apply step */
  #c-assistant .addrow { margin-bottom: 0; }
  .asst-log { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .asst-log:empty { display: none; }
  .asst-reply { background: #1d212b; border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0; padding: 9px 12px; font-size: 14px; }
  .asst-actions { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .act-item { padding: 9px 12px; border-top: 1px solid var(--line); font-size: 14px; }
  .act-item:first-child { border-top: none; }
  .asst-bar { display: flex; gap: 8px; align-items: center; padding: 10px 12px;
    background: #12151c; border-top: 1px solid var(--line); }
  .asst-bar .spacer { flex: 1; }
  .asst-apply { padding: 0 16px; min-height: 34px; border-radius: 8px; background: var(--good);
    color: #0b0d12; border: none; font-weight: 700; cursor: pointer; }
  .asst-note { color: var(--muted); font-size: 13px; }
  .asst-err { color: var(--soft); font-size: 13px; }
  .asst-ok { color: var(--good); font-weight: 700; }
  .asst-fail { color: var(--call); font-weight: 700; }

  #gate { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 10; padding: 16px; }
  #gate .box { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 24px; width: min(420px, 100%); }
  #gate h2 { margin: 0 0 6px; font-size: 16px; }
  #gate p { color: var(--muted); font-size: 13px; margin: 0 0 16px; }
  #gate input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--line);
                background: var(--bg); color: var(--fg); font-size: 16px; margin-bottom: 12px; }
  #gate button { width: 100%; padding: 12px; min-height: 44px; background: var(--accent); color: #0b0d12; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
  #gate .gsi { display: block; box-sizing: border-box; width: 100%; padding: 12px; min-height: 44px;
    line-height: 20px; text-align: center; text-decoration: none; background: var(--accent);
    color: #0b0d12; border-radius: 8px; font-weight: 700; }
  #gate .gsi:hover { filter: brightness(1.06); }
  #gate .tokenfallback { margin-top: 16px; }
  #gate .tokenfallback summary { color: var(--muted); font-size: 13px; cursor: pointer; }
  #gate .tokenfallback input { margin-top: 10px; }

  /* Panic mode — a prominent alarm button and a focused, dim-everything overlay
     so an overwhelmed user sees one screen: the single first step, then the
     short list of what's actually on fire. */
  .alarm { background: #2c1620; color: #ffb3c0; border-color: #5a2130; }
  .alarm:hover { border-color: var(--call); color: #fff; }
  #panic { position: fixed; inset: 0; z-index: 20; display: none; overflow-y: auto;
    background: rgba(8,9,12,.86); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    align-items: flex-start; justify-content: center;
    padding: max(24px, env(safe-area-inset-top)) 16px 32px; }
  #panic .box { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 20px 20px; width: min(620px, 100%); box-shadow: 0 24px 70px rgba(0,0,0,.55); }
  .panic-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .panic-head h2 { margin: 0; font-size: 18px; }
  .panic-head .spacer { flex: 1; }
  .panic-ground { font-size: 16px; line-height: 1.45; margin: 4px 0 14px; }
  .panic-first { background: #15231a; border: 1px solid #245232; border-radius: 12px;
    padding: 14px 16px; margin: 0 0 16px; }
  .panic-first-label { font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; color: var(--good); margin-bottom: 6px; }
  .panic-first-step { font-size: 17px; line-height: 1.45; }
  .panic-first-for { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .panic-sec { margin: 0 0 14px; }
  .panic-sec-h { font-size: 13px; font-weight: 700; letter-spacing: .3px; margin: 0 0 2px; }
  .panic-sec-h.b-late { color: var(--call); }
  .panic-sec-h.b-soon { color: var(--firm); }
  .panic-sec-h.b-pile { color: var(--soft); }
  .panic-foot { color: var(--muted); font-size: 13px; font-style: italic; margin: 16px 0 0; }

  @media (max-width: 520px) {
    .banner { padding: 12px 12px 0; }
    .masonry { columns: 1; padding: 12px 12px 24px; }
    header { padding: 12px 14px; padding-top: max(12px, env(safe-area-inset-top)); }
    .addrow { flex-wrap: wrap; }
    .addrow input { flex-basis: 100%; }
  }
</style>
</head>
<body>
<header>
  <h1>🧠 Prefrontal</h1>
  <span class="meta" id="status">loading…</span>
  <span class="spacer"></span>
  <button class="ghost alarm" id="panic-btn" title="Overwhelmed? See what's on fire + one first step">😮‍💨 Panic</button>
  <button class="ghost" id="refresh">Refresh</button>
  <a class="ghost" href="/family" title="Calm, non-technical family view" style="text-decoration:none">Family view</a>
  <button class="ghost" id="signout" title="Forget the saved token">Sign out</button>
</header>

<div class="banner">
  <section class="card" id="c-outings"><h2>Outings — active</h2><div class="body"></div></section>
</div>

<div class="banner">
  <section class="card" id="c-assistant">
    <h2>Assistant — ask for changes</h2>
    <div class="addrow">
      <input id="asst-input" autocomplete="off"
        placeholder="e.g. bump the dentist call to urgent and drop the dry-cleaning todo" />
      <button class="add" data-action="asst-send">Ask</button>
    </div>
    <div class="asst-log" id="asst-log"></div>
  </section>
</div>

<main class="masonry">
  <section class="card" id="c-todos">
    <h2>Todos</h2>
    <div class="addrow">
      <input id="todo-title" placeholder="Add a todo…" autocomplete="off" />
      <select id="todo-pri" aria-label="priority">
        <option value="auto" selected>auto</option>
        <option value="1">normal</option>
        <option value="3">urgent</option>
        <option value="2">high</option>
        <option value="0">low</option>
      </select>
      <button class="add" data-action="todo-add">Add</button>
    </div>
    <div class="body"></div>
  </section>
  <section class="card" id="c-categories"><h2>Todo categories</h2><div class="body"></div></section>
  <section class="card" id="c-commitments"><h2>Commitments</h2><div class="body"></div></section>
  <section class="card" id="c-briefing"><h2>Today's briefing</h2><div class="body"></div></section>
  <section class="card" id="c-recent"><h2>Outings — recent</h2><div class="body"></div></section>
  <section class="card" id="c-profile"><details class="collapse"><summary><h2>Behavioral profile</h2><span class="updated" id="profile-updated"></span></summary><div class="body"></div></details></section>
  <section class="card" id="c-triage"><details class="collapse"><summary><h2>Mail triage — learned from drops</h2></summary><div class="body"></div></details></section>
</main>

<div id="gate">
  <div class="box">
    <h2>Sign in</h2>
    <a class="gsi" href="/auth/google/login">Sign in with Google</a>
    <details class="tokenfallback">
      <summary>Use an access token instead</summary>
      <input id="token-input" type="password" placeholder="X-Prefrontal-Token" autocomplete="off" />
      <button id="token-save">Open dashboard</button>
    </details>
    <div class="err" id="gate-err"></div>
  </div>
</div>

<div id="panic" role="dialog" aria-modal="true" aria-label="Panic mode">
  <div class="box">
    <div class="panic-head">
      <h2>😮‍💨 Panic mode</h2>
      <span class="spacer"></span>
      <button class="ghost" id="panic-refresh" title="Recompute">Refresh</button>
      <button class="ghost" id="panic-close">Close</button>
    </div>
    <div class="body"><div class="empty">loading…</div></div>
  </div>
</div>

<script>
const KEY = "prefrontal_token";
const REFRESH_MS = 15000;
let token = localStorage.getItem(KEY);
let timer = null;

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));

function fmt(ts) {
  if (!ts) return "—";
  const d = new Date(String(ts).replace(" ", "T") + "Z");
  return isNaN(d) ? ts : d.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}
function mins(n) { return n == null ? "—" : Math.round(n) + " min"; }

// Minimal, safe markdown: escape first, then format a known subset.
function md(src) {
  const inline = (s) => esc(s)
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/`(.+?)`/g, "<code>$1</code>")
    .replace(/(^|[\s(])_([^_]+?)_(?=[\s).,;:!?]|$)/g, "$1<em>$2</em>");
  const out = [];
  let inList = false;
  const closeList = () => { if (inList) { out.push("</ul>"); inList = false; } };
  for (const raw of String(src).split("\n")) {
    const line = raw.replace(/\s+$/, "");
    let m;
    if ((m = line.match(/^\s*[-•]\s+(.*)$/))) { if (!inList) { out.push("<ul>"); inList = true; } out.push("<li>" + inline(m[1]) + "</li>"); continue; }
    closeList();
    if ((m = line.match(/^###\s+(.*)$/))) out.push("<h4>" + inline(m[1]) + "</h4>");
    else if ((m = line.match(/^##\s+(.*)$/))) out.push("<h3>" + inline(m[1]) + "</h3>");
    else if ((m = line.match(/^#\s+(.*)$/))) out.push("<h3>" + inline(m[1]) + "</h3>");
    else if ((m = line.match(/^>\s?(.*)$/))) out.push("<blockquote>" + inline(m[1]) + "</blockquote>");
    else if (line.trim() === "" || /^[-—]{3,}$/.test(line.trim())) { /* skip blank / rule */ }
    else out.push("<p>" + inline(line) + "</p>");
  }
  closeList();
  return '<div class="md">' + out.join("") + "</div>";
}

function gate(msg) {
  token = null; localStorage.removeItem(KEY); clearInterval(timer);
  $("#gate-err").textContent = msg || "";
  $("#gate").style.display = "flex";
}

// Auth header only when we have a token; otherwise the Google session cookie
// (sent automatically, same-origin) does the work. Sending an empty/"null"
// token header would be treated as an invalid token and skip the cookie path.
function authHeaders(extra) {
  return token ? { "X-Prefrontal-Token": token, ...(extra || {}) } : { ...(extra || {}) };
}
async function api(path) {
  const r = await fetch(path, { headers: authHeaders() });
  if (r.status === 401) { const e = new Error("unauthorized"); e.code = 401; throw e; }
  if (!r.ok) throw new Error(path + " → HTTP " + r.status);
  const ct = r.headers.get("content-type") || "";
  return ct.includes("application/json") ? r.json() : r.text();
}
// The profile body is plain prose; its "last updated" time rides in the
// X-Profile-Generated-At header (generated nightly by `prefrontal summarize`),
// so fetch it directly to keep the header that api() would discard.
async function apiProfile() {
  const r = await fetch("/profile", { headers: authHeaders() });
  if (r.status === 401) { const e = new Error("unauthorized"); e.code = 401; throw e; }
  if (!r.ok) throw new Error("/profile → HTTP " + r.status);
  return { text: await r.text(), generatedAt: r.headers.get("X-Profile-Generated-At") };
}
async function post(path, body) {
  const r = await fetch(path, {
    method: "POST",
    headers: authHeaders({ "Content-Type": "application/json" }),
    body: JSON.stringify(body || {}),
  });
  if (r.status === 401) { gate("That token was rejected."); throw new Error("401"); }
  if (!r.ok) { alert("Action failed (HTTP " + r.status + "): " + (await r.text())); throw new Error(path); }
  return r.json().catch(() => ({}));
}

// Deterministic pill color from a category label — same label, same hue, no
// server config. A muted HSL so text stays readable in light and dark.
function catColor(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 360;
  return `hsl(${h} 45% 42%)`;
}

function renderOutings(d) {
  const a = (d.active || []);
  if (!a.length) return `<div class="empty">No active outings.</div>`;
  return a.map((o) => {
    const pct = o.time_window_minutes ? Math.min(150, (o.elapsed_minutes / o.time_window_minutes) * 100) : 0;
    return `<div class="row">
      <div class="main">
        <div><span class="title">${esc(o.intention)}</span> <span class="badge lvl-${o.level}">${o.level}</span></div>
        <div class="sub">out ${mins(o.elapsed_minutes)} of ${mins(o.time_window_minutes)} · since ${fmt(o.departure_at)}</div>
        <div class="bar"><span style="width:${(pct / 1.5).toFixed(0)}%;background:var(--${o.level})"></span></div>
      </div>
      <div class="acts">
        <button class="btn-sm btn-go" data-action="outing-return" data-id="${o.outing_id}">Back</button>
        <button class="btn-sm btn-x" data-action="outing-abandon" data-id="${o.outing_id}">Abandon</button>
      </div>
    </div>`;
  }).join("");
}
function renderRecent(d) {
  const r = (d.recent || []).filter((o) => o.status !== "active");
  if (!r.length) return `<div class="empty">No recent outings.</div>`;
  return r.slice(0, 12).map((o) => `<div class="row"><div class="main">
    <div><span class="title">${esc(o.intention)}</span> <span class="pill">${o.status}</span></div>
    <div class="sub">window ${mins(o.time_window_minutes)} · left ${fmt(o.departure_at)} · back ${fmt(o.returned_at)}</div>
  </div></div>`).join("");
}
function renderTodos(d) {
  const t = (d.todos || []);
  if (!t.length) return `<div class="empty">No open todos.</div>`;
  const names = ["low", "normal", "high", "urgent"];
  // Config-driven account pills: the /todos response maps each account name to a
  // {label, color}. A todo's account with no config entry gets a plain pill
  // naming the account, so nothing is hard-coded here.
  const accts = d.accounts || {};
  const acctPill = (account) => {
    if (!account) return "";
    const cfg = accts[account];
    const label = cfg && cfg.label ? cfg.label : account;
    const color = cfg && cfg.color ? cfg.color : "";
    const style = color ? ` style="background:${esc(color)}"` : "";
    const cls = color ? "pill acct" : "pill";
    return ` <span class="${cls}"${style} title="from ${esc(account)}">${esc(label)}</span>`;
  };
  // Category chip: a stable color hashed from the label so the same category
  // always reads the same, without any server-side config. Clicking edits it.
  const catPill = (id, category) => {
    const cur = category || "";
    const label = cur || "+ category";
    const style = cur ? ` style="background:${catColor(cur)}"` : "";
    const cls = cur ? "pill cat" : "pill cat none";
    return ` <button class="${cls}"${style} data-action="todo-category" data-id="${id}" data-category="${esc(cur)}" title="Set category">${esc(label)}</button>`;
  };
  return t.map((x) => {
    const dc = x.decomposition;
    let step = "";
    if (dc) {
      // Steps are indexed 0 = first_step, 1..N = remaining; done_steps holds the
      // completed indices. Each step gets a check CTA so progress is visible.
      const done = new Set(dc.done_steps || []);
      const check = (i) => {
        const on = done.has(i);
        return `<button class="step-check${on ? " on" : ""}" data-action="step-toggle" data-id="${x.id}" data-step="${i}" data-done="${on ? 0 : 1}" title="${on ? "Mark not done" : "Mark done"}" aria-label="${on ? "Mark step not done" : "Mark step done"}">${on ? "✓" : ""}</button>`;
      };
      const steps = dc.steps || [];
      const total = 1 + steps.length;
      const ndone = [...done].filter((i) => i >= 0 && i < total).length;
      const first = `<div class="firststep step${done.has(0) ? " step-done" : ""}">${check(0)}<span class="badge first">start</span> <span class="steptext">${esc(dc.first_step)}</span></div>`;
      const rest = steps.length
        ? `<details class="steps"${ndone > 0 ? " open" : ""}><summary>then ${steps.length} more step${steps.length > 1 ? "s" : ""}${ndone ? ` · ${ndone}/${total} done` : ""}</summary>
             <ul class="steplist">${steps.map((s, j) => `<li class="step${done.has(j + 1) ? " step-done" : ""}">${check(j + 1)} <span class="steptext">${esc(s)}</span></li>`).join("")}</ul></details>`
        : "";
      step = first + rest;
    }
    const breakBtn = dc
      ? `<button class="btn-sm" data-action="decompose" data-id="${x.id}" title="Regenerate first step">↻</button>`
      : `<button class="btn-sm" data-action="decompose" data-id="${x.id}">Break it down</button>`;
    const dueText = x.deadline ? "due " + fmt(x.deadline) : "no deadline";
    return `<div class="row">
      <div class="main">
        <div><span class="title">${esc(x.title)}</span> <span class="pill pri-${x.priority}">${names[x.priority] || x.priority}</span>${catPill(x.id, x.category)}${acctPill(x.account)}${x.avoidance ? ` <span class="badge avoiding">avoiding ${Math.round(x.avoidance.days_open)}d</span>` : ""}</div>
        <div class="sub">${x.estimate_minutes != null ? "~" + mins(x.estimate_minutes) + " · " : ""}${dueText} <button class="lnk" data-action="todo-deadline" data-id="${x.id}" data-deadline="${esc(x.deadline || "")}" title="Change deadline">edit</button>${x.energy ? " · " + esc(x.energy) + " energy" : ""}</div>
        ${step}
      </div>
      <div class="acts">
        ${breakBtn}
        <button class="btn-sm btn-go" data-action="todo-done" data-id="${x.id}">Done</button>
        <button class="btn-sm btn-x" data-action="todo-drop" data-id="${x.id}">Drop</button>
      </div>
    </div>`;
  }).join("");
}
function renderCategories(d) {
  const s = (d.stats || []);
  if (!s.length) return `<div class="empty">No categories yet.</div>`;
  // avoidance relative to the busiest category, for a simple 0–100% bar.
  const maxAvoid = Math.max(1, ...s.map((c) => c.avoidance || 0));
  const capNote = d.at_cap ? ` <span class="badge avoiding">at cap ${d.cap}</span>` : "";
  const rows = s.map((c) => {
    const len = c.avg_estimate_minutes != null ? "~" + mins(c.avg_estimate_minutes) : "—";
    const comp = c.completion_rate != null ? Math.round(c.completion_rate * 100) + "% done" : "—";
    const av = (c.avoidance || 0);
    const pct = ((av / maxAvoid) * 100).toFixed(0);
    return `<div class="row"><div class="main">
      <div><span class="pill cat" style="background:${catColor(c.category)}">${esc(c.category)}</span>
        <span class="sub">${c.open} open · ${len} typical · ${comp}</span></div>
      ${av > 0 ? `<div class="bar" title="avoidance ${av}"><span style="width:${pct}%;background:var(--high)"></span></div>` : ""}
    </div></div>`;
  }).join("");
  return `<div class="catlead">${s.length}/${d.cap} categories in use${capNote}</div>` + rows;
}
function renderCommitments(list, conflicts) {
  const c = (list.commitments || []);
  // Config-driven calendar pills: the /commitments response maps each feed slug
  // (calendar_key) to a {label, color}. A commitment whose calendar has no config
  // entry falls back to its default label as a plain pill — nothing hard-coded.
  const cals = list.calendars || {};
  const calPill = (key, label) => {
    const cfg = key ? cals[key] : null;
    const text = cfg && cfg.label ? cfg.label : label;
    if (!text) return "";
    const color = cfg && cfg.color ? cfg.color : "";
    const style = color ? ` style="background:${esc(color)}"` : "";
    const cls = color ? "pill cal" : "pill";
    const title = label && text !== label ? ` title="calendar: ${esc(label)}"` : "";
    return ` <span class="${cls}"${style}${title}>${esc(text)}</span>`;
  };
  const ids = new Set();
  (conflicts.conflicts || []).forEach((p) => { ids.add(p.a.id); ids.add(p.b.id); });
  let html = "";
  (conflicts.conflicts || []).forEach((p) => {
    html += `<div class="row"><div class="main"><span class="badge conflict">conflict</span>
      <span class="sub">${esc(p.a.title)} ↔ ${esc(p.b.title)} overlap ${mins(p.overlap_minutes)}</span></div></div>`;
  });
  (conflicts.possible_conflicts || []).forEach((p) => {
    html += `<div class="row">
      <div class="main"><span class="badge possible">possible</span>
        <span class="sub">${esc(p.a.title)} ↔ ${esc(p.b.title)} overlap ${mins(p.overlap_minutes)}</span></div>
      <div class="acts"><button class="btn-sm" data-action="dismiss-conflict" data-key="${esc(p.key)}">Dismiss</button></div>
    </div>`;
  });
  if (!c.length) return html || `<div class="empty">No upcoming commitments.</div>`;
  html += c.map((x) => {
    const fyi = x.kind === "fyi";
    const cal = calPill(x.calendar_key, x.calendar);
    const fyiBadge = fyi ? ' <span class="pill fyi" title="Where someone will be — never a conflict">FYI</span>' : "";
    const dbl = (!fyi && ids.has(x.id)) ? ' <span class="pill conflict">double-booked</span>' : "";
    const target = fyi ? "self" : "fyi";
    const btnTitle = fyi ? "Not FYI — mark as your own commitment" : "Mark FYI (where someone will be — never a conflict)";
    const src = x.url ? ` <a class="src" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer" title="Open source event">↗</a>` : "";
    return `<div class="row"><div class="main">
      <div><span class="title">${esc(x.title)}</span>${src}${cal}${fyiBadge}${dbl}</div>
      <div class="sub">${fmt(x.start_at)}${x.location ? " · " + esc(x.location) : ""} · ${esc(x.hardness)}</div>
    </div>
    <div class="acts"><button class="btn-sm" data-action="commitment-kind" data-id="${x.id}" data-kind="${target}" title="${btnTitle}">${fyi ? "Mine" : "FYI"}</button></div>
  </div>`;
  }).join("");
  return html;
}

// The feedback loop from dropping intake todos: a dropped mail-created todo is a
// hint triage over-flagged. This panel shows what that has taught triage — most
// importantly the prompt addendum, the exact text appended on the next sync.
function renderTriage(d) {
  const addendum = (d.prompt_addendum || "").trim();
  const senders = d.senders || [];
  const recent = d.recent || [];
  let html = "";

  // The impact on the ingestion check: what actually changes on the next sync.
  html += addendum
    ? `<div class="row"><div class="main">
        <div class="subhead">Injected into the triage prompt on the next sync</div>
        <div class="sub">This is how your drops change what gets flagged as needing action:</div>
        <pre class="addendum">${esc(addendum)}</pre>
      </div></div>`
    : `<div class="empty">No corrections qualify yet — triage uses the base prompt. Only quick drops (soon after a mail arrives) and repeat-sender drops move it; a one-off slow drop is logged but treated as possible avoidance, not a triage error.</div>`;

  // Repeat-offender senders — treated as no-action hints.
  if (senders.length) {
    html += `<div class="row"><div class="main">
      <div class="subhead">Repeat-dropped senders</div>` +
      senders.map((s) => {
        const who = esc(s.sender_name || s.sender_email || "?");
        return `<div class="sub">${who} <span class="pill">${s.drops} dropped</span></div>`;
      }).join("") +
      `</div></div>`;
  }

  // The raw drop log (newest first), each removable if it was really avoidance.
  if (recent.length) {
    html += `<div class="row"><div class="main"><div class="subhead">Recent drops</div></div>
      <div class="acts"><button class="btn-sm btn-x" data-action="triage-clear" title="Forget every learned correction">Clear all</button></div></div>`;
    html += recent.slice(0, 15).map((r) => {
      const who = esc(r.sender_name || r.sender_email || "?");
      const age = typeof r.days_open === "number" ? r.days_open.toFixed(1) + "d open" : "age unknown";
      return `<div class="row">
        <div class="main">
          <div><span class="title">${who}</span> <span class="pill">${age}</span></div>
          <div class="sub">${esc(r.subject || "(no subject)")}</div>
        </div>
        <div class="acts"><button class="btn-sm" data-action="triage-forget" data-id="${r.id}" title="Forget this correction — it was really avoidance, not a triage error">Forget</button></div>
      </div>`;
    }).join("");
    if (recent.length > 15) html += `<div class="sub" style="padding-top:8px">…and ${recent.length - 15} more.</div>`;
  }
  return html;
}

// Panic mode: rendered from the structured /panic response (not the markdown
// text) so the single first step and the three buckets get first-class emphasis.
function renderPanic(d) {
  const counts = d.counts || {};
  const pressing = counts.pressing || 0;
  const piling = (d.piling_up || []).length;
  if (!pressing && !piling) {
    return `<p class="panic-ground"><strong>Nothing is actually on fire.</strong> No hard deadlines are past, and nothing needs you in the next couple of hours. The overwhelm is real, but the board is empty — take a breath, then pick one small thing you <em>want</em> to move.</p>`;
  }
  let html = "";
  html += `<p class="panic-ground">` + (pressing
    ? `Breathe. <strong>${pressing} thing${pressing > 1 ? "s" : ""} actually need you right now</strong> — that's the whole list. Everything else can wait.`
    : `Breathe — <strong>nothing has a hard clock right now.</strong> A few things are piling up, but you're not late on any of them.`) + `</p>`;
  if (d.first_step) {
    html += `<div class="panic-first">
      <div class="panic-first-label">▶ Start here</div>
      <div class="panic-first-step">${esc(d.first_step)}</div>
      ${d.first_step_for ? `<div class="panic-first-for">that gets “${esc(d.first_step_for)}” moving</div>` : ""}
    </div>`;
  }
  const sec = (title, cls, items) => {
    if (!items || !items.length) return "";
    return `<div class="panic-sec"><div class="panic-sec-h ${cls}">${title} (${items.length})</div>` +
      items.map((p) => `<div class="row"><div class="main">
        <div class="title">${esc(p.title)}</div>
        <div class="sub">${esc(p.when)}${p.source ? " · " + esc(p.source) : ""}</div>
      </div></div>`).join("") + `</div>`;
  };
  html += sec("🔴 Already behind", "b-late", d.late);
  html += sec("🟠 Bearing down soon", "b-soon", d.soon);
  html += sec("🟡 Piling up — no clock, but don't forget", "b-pile", d.piling_up);
  html += `<p class="panic-foot">Do the one thing at the top, then come back and look again.</p>`;
  return html;
}

async function loadPanic() {
  const body = $("#panic .body");
  body.innerHTML = `<div class="empty">looking at what's actually on fire…</div>`;
  try {
    body.innerHTML = renderPanic(await api("/panic"));
  } catch (err) {
    if (err && err.code === 401) { closePanic(); gate("That token was rejected."); return; }
    body.innerHTML = `<div class="err">Couldn't load panic mode — try Refresh.</div>`;
  }
}
function openPanic() { $("#panic").style.display = "flex"; loadPanic(); }
function closePanic() { $("#panic").style.display = "none"; }

// Dashboard assistant: ask → review proposed actions → Apply. Nothing is written
// until Apply, and the server re-validates on apply, so a stale/edited action is
// dropped rather than acting on the wrong row.
let pendingActions = [];
async function askAssistant() {
  const input = $("#asst-input");
  const msg = input.value.trim();
  if (!msg) return;
  const log = $("#asst-log");
  log.innerHTML = `<div class="asst-note">thinking…</div>`;
  let d;
  try {
    d = await post("/assistant", { message: msg });
  } catch (_) {
    log.innerHTML = `<div class="err">Assistant unavailable — is a model configured?</div>`;
    return;
  }
  pendingActions = d.actions || [];
  let html = `<div class="asst-reply">${esc(d.reply || "")}</div>`;
  if (pendingActions.length) {
    const n = pendingActions.length;
    html += `<div class="asst-actions">` +
      pendingActions.map((a) => `<div class="act-item">${esc(a.summary || a.op)}</div>`).join("") +
      `<div class="asst-bar"><span class="asst-note">${n} change${n !== 1 ? "s" : ""} — review before applying</span>` +
      `<span class="spacer"></span>` +
      `<button class="btn-sm" data-action="asst-discard">Discard</button>` +
      `<button class="asst-apply" data-action="asst-apply">Apply</button></div></div>`;
  }
  if (d.errors && d.errors.length) {
    html += `<div class="asst-err">Couldn't do: ${d.errors.map(esc).join("; ")}</div>`;
  }
  log.innerHTML = html;
  input.value = "";
}
function renderApplied(d) {
  const results = d.results || [];
  let html = `<div class="asst-reply">Applied ${d.applied || 0} of ${results.length}.</div>`;
  if (results.length) {
    html += `<div class="asst-actions">` + results.map((r) =>
      `<div class="act-item"><span class="${r.ok ? "asst-ok" : "asst-fail"}">${r.ok ? "✓" : "✗"}</span> ` +
      `${esc(r.summary || r.op)}${r.detail ? ` <span class="asst-note">— ${esc(r.detail)}</span>` : ""}</div>`
    ).join("") + `</div>`;
  }
  if (d.errors && d.errors.length) {
    html += `<div class="asst-err">Skipped: ${d.errors.map(esc).join("; ")}</div>`;
  }
  $("#asst-log").innerHTML = html;
}

async function load() {
  // Always attempt: a Google session cookie can authenticate even with no token.
  // A 401 below reveals the sign-in gate.
  $("#status").textContent = "refreshing…";
  const results = await Promise.allSettled([
    api("/outings"), api("/todos"), api("/commitments"),
    api("/commitments/conflicts"), api("/briefing"), apiProfile(),
    api("/mail/triage/learned"), api("/todos/categories"),
  ]);
  if (results.some((r) => r.status === "rejected" && r.reason && r.reason.code === 401)) {
    gate("That token was rejected."); return;
  }
  const [outings, todos, commitments, conflicts, briefing, profile, triage, categories] = results;
  const put = (sel, r, render) => { $(sel + " .body").innerHTML = r.status === "fulfilled" ? render(r.value) : `<div class="err">unavailable</div>`; };
  put("#c-outings", outings, renderOutings);
  put("#c-recent", outings, renderRecent);
  put("#c-todos", todos, renderTodos);
  put("#c-categories", categories, renderCategories);
  put("#c-triage", triage, renderTriage);
  $("#c-commitments .body").innerHTML = commitments.status === "fulfilled"
    ? renderCommitments(commitments.value, conflicts.status === "fulfilled" ? conflicts.value : { conflicts: [] })
    : `<div class="err">unavailable</div>`;
  $("#c-briefing .body").innerHTML = briefing.status === "fulfilled" ? md(briefing.value.text || "") : `<div class="err">unavailable</div>`;
  if (profile.status === "fulfilled") {
    $("#c-profile .body").innerHTML = md(profile.value.text);
    $("#profile-updated").textContent = profile.value.generatedAt
      ? "updated " + fmt(profile.value.generatedAt) : "not yet generated";
  } else {
    $("#c-profile .body").innerHTML = `<div class="err">unavailable</div>`;
    $("#profile-updated").textContent = "";
  }
  $("#status").textContent = "updated " + new Date().toLocaleTimeString();
}

function start() { load(); clearInterval(timer); timer = setInterval(load, REFRESH_MS); }

// Action delegation (rows are re-rendered, so listen on the document).
document.addEventListener("click", async (e) => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  // Debounce: ignore repeat taps while this CTA's action is in flight.
  if (el.disabled) return;
  el.disabled = true;
  const act = el.dataset.action, id = el.dataset.id;
  try {
    if (act === "todo-add") {
      const title = $("#todo-title").value.trim();
      if (!title) return;
      const pri = $("#todo-pri").value;
      // "auto" → omit priority so the server infers it (along with estimate/energy).
      const body = pri === "auto" ? { title } : { title, priority: Number(pri) };
      await post("/todos", body);
      $("#todo-title").value = "";
    } else if (act === "todo-done") { await post(`/todos/${id}/done`); }
    else if (act === "todo-drop") { if (!confirm("Drop this todo?")) return; await post(`/todos/${id}/drop`); }
    else if (act === "outing-return") { if (!confirm("Mark this outing as returned?")) return; await post("/webhooks/outing/return", { outing_id: Number(id), status: "returned" }); }
    else if (act === "outing-abandon") { if (!confirm("Mark this outing abandoned?")) return; await post("/webhooks/outing/return", { outing_id: Number(id), status: "abandoned" }); }
    else if (act === "dismiss-conflict") { await post("/commitments/conflicts/dismiss", { key: el.dataset.key }); }
    else if (act === "commitment-kind") { await post(`/commitments/${id}/kind`, { kind: el.dataset.kind }); }
    else if (act === "decompose") { await post(`/todos/${id}/decompose`); }
    else if (act === "todo-deadline") {
      // Stored as "YYYY-MM-DD HH:MM:SS" UTC; offer the date as the default.
      const cur = el.dataset.deadline || "";
      const v = prompt("New deadline (YYYY-MM-DD, or YYYY-MM-DD HH:MM). Blank to clear:", cur ? cur.slice(0, 10) : "");
      if (v === null) return; // cancelled — leave it untouched
      await post(`/todos/${id}/deadline`, { deadline: v.trim() || null });
    }
    else if (act === "todo-category") {
      const cur = el.dataset.category || "";
      // Offer the existing vocabulary so edits converge rather than sprawl.
      let existing = [];
      try { existing = (await api("/todos/categories")).categories || []; } catch (_) {}
      const hint = existing.length ? "\nExisting: " + existing.join(", ") : "";
      const v = prompt("Category (blank to clear):" + hint, cur);
      if (v === null) return; // cancelled
      await post(`/todos/${id}/category`, { category: v.trim() || null });
    }
    else if (act === "step-toggle") { await post(`/todos/${id}/steps/${el.dataset.step}/done`, { done: el.dataset.done === "1" }); }
    else if (act === "triage-forget") { await post("/mail/triage/learned/forget", { id: Number(id) }); }
    else if (act === "triage-clear") { if (!confirm("Forget all learned triage corrections? This resets triage to the base prompt.")) return; await post("/mail/triage/learned/clear"); }
    else if (act === "asst-send") { await askAssistant(); return; }
    else if (act === "asst-discard") { pendingActions = []; $("#asst-log").innerHTML = ""; return; }
    else if (act === "asst-apply") {
      if (!pendingActions.length) return;
      renderApplied(await post("/assistant/apply", { actions: pendingActions }));
      pendingActions = [];
      // fall through to load() so the cards reflect the applied changes
    }
    load();
  } catch (_) { /* post() already surfaced the error */ }
  finally { el.disabled = false; }
});
$("#todo-title").addEventListener("keydown", (e) => { if (e.key === "Enter") document.querySelector('[data-action="todo-add"]').click(); });
$("#asst-input").addEventListener("keydown", (e) => { if (e.key === "Enter") document.querySelector('[data-action="asst-send"]').click(); });

$("#refresh").onclick = load;
$("#panic-btn").onclick = openPanic;
$("#panic-close").onclick = closePanic;
$("#panic-refresh").onclick = loadPanic;
// Backdrop tap and Escape both dismiss the overlay.
$("#panic").addEventListener("click", (e) => { if (e.target.id === "panic") closePanic(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closePanic(); });
$("#signout").onclick = () => gate("");
$("#token-save").onclick = () => {
  const v = $("#token-input").value.trim();
  if (!v) return;
  token = v; localStorage.setItem(KEY, v);
  $("#gate").style.display = "none"; $("#gate-err").textContent = "";
  start();
};
$("#token-input").addEventListener("keydown", (e) => { if (e.key === "Enter") $("#token-save").click(); });

start();  // try the session cookie (or a saved token); the gate appears only on 401
</script>
</body>
</html>
