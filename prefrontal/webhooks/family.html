<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<title>Prefrontal — Family</title>
<style>
  :root {
    --bg: #f7f5f1; --card: #ffffff; --line: #e7e2d8; --fg: #2c2a26;
    --muted: #877f72; --accent: #4a7c59; --warn: #b9762f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 17px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 18px 40px; }
  header {
    padding: 26px 18px 8px; padding-top: max(26px, env(safe-area-inset-top));
    max-width: 560px; margin: 0 auto;
  }
  header h1 { font-size: 22px; margin: 0; font-weight: 650; letter-spacing: .2px; }
  header .meta { color: var(--muted); font-size: 13px; margin-top: 3px; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 20px 20px; margin: 16px 0 0; box-shadow: 0 1px 2px rgba(0,0,0,.03);
  }
  .label { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 0 0 10px; }
  .big { font-size: 20px; font-weight: 600; margin: 0; }
  .note { color: var(--muted); font-size: 15px; margin-top: 6px; }
  .note.warn { color: var(--warn); }

  .item { display: flex; gap: 12px; padding: 12px 0; border-top: 1px solid var(--line); align-items: baseline; }
  .item:first-of-type { border-top: none; }
  .time { font-variant-numeric: tabular-nums; font-weight: 650; color: var(--accent); min-width: 64px; }
  .what { flex: 1; }
  .where { color: var(--muted); font-size: 14px; }
  .empty { color: var(--muted); }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:var(--accent); margin-right:7px; vertical-align: middle; }
  .dot.warn { background: var(--warn); }

  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 22px; }
  a.linkish { color: var(--muted); font-size: 12px; text-decoration: none; }

  #gate { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; padding: 18px; }
  #gate .box { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 26px; width: min(420px, 100%); }
  #gate h2 { margin: 0 0 6px; font-size: 18px; }
  #gate p { color: var(--muted); font-size: 14px; margin: 0 0 16px; }
  #gate input { width: 100%; padding: 13px; border-radius: 10px; border: 1px solid var(--line);
                background: #fff; color: var(--fg); font-size: 16px; margin-bottom: 12px; }
  #gate button { width: 100%; padding: 13px; min-height: 46px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-weight: 650; font-size: 16px; cursor: pointer; }
  #gate .err { color: #b03a3a; font-size: 13px; min-height: 16px; margin-bottom: 8px; }
</style>
</head>
<body>
<header>
  <h1 id="greeting">🏡 Today</h1>
  <div class="meta" id="status">loading…</div>
</header>

<div class="wrap">
  <section class="card" id="c-now">
    <p class="label">Right now</p>
    <div class="body"><p class="big">…</p></div>
  </section>

  <section class="card" id="c-today">
    <p class="label">On the calendar today</p>
    <div class="body"></div>
  </section>

  <footer>
    Updates on its own · <a class="linkish" href="/dashboard">full dashboard</a>
  </footer>
</div>

<div id="gate">
  <div class="box">
    <h2>Enter access code</h2>
    <p>Ask for the household access code. It's saved only on this device.</p>
    <input id="token-input" type="password" placeholder="Access code" autocomplete="off" />
    <div class="err" id="gate-err"></div>
    <button id="token-save">View today</button>
  </div>
</div>

<script>
const KEY = "prefrontal_token";
const REFRESH_MS = 30000;
let token = localStorage.getItem(KEY);
let timer = null;

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
const cap = (s) => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;

// A stored "YYYY-MM-DD HH:MM:SS" UTC timestamp -> local Date.
function toDate(ts) { return ts ? new Date(String(ts).replace(" ", "T") + "Z") : null; }
function clock(d) { return d && !isNaN(d) ? d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : "—"; }

function gate(msg) {
  token = null; localStorage.removeItem(KEY); clearInterval(timer);
  $("#gate-err").textContent = msg || "";
  $("#gate").style.display = "flex";
}

async function api(path) {
  const r = await fetch(path, { headers: { "X-Prefrontal-Token": token } });
  if (r.status === 401) { const e = new Error("unauthorized"); e.code = 401; throw e; }
  if (!r.ok) throw new Error(path + " → HTTP " + r.status);
  return r.json();
}

function renderNow(outings, name) {
  const who = name || "They";
  const active = (outings.active || []);
  if (!active.length) {
    return `<p class="big">${esc(who)} isn't out on an errand right now.</p>`;
  }
  return active.map((o) => {
    const back = toDate(o.departure_at);
    if (back) back.setMinutes(back.getMinutes() + (o.time_window_minutes || 0));
    const over = o.level === "firm" || o.level === "call";
    const dot = over ? "dot warn" : "dot";
    let note;
    if (o.level === "call") note = `Running quite a bit over — was hoping to be back by ${clock(back)}.`;
    else if (o.level === "firm") note = `About time to head back (aimed for ${clock(back)}).`;
    else note = `Aiming to be back around ${clock(back)}.`;
    return `<p class="big"><span class="${dot}"></span>${esc(who)} is out — ${esc(o.intention)}.</p>
            <p class="note ${over ? "warn" : ""}">${esc(note)}</p>`;
  }).join("");
}

function renderToday(briefing) {
  const items = (briefing.today || []);
  if (!items.length) return `<p class="empty">Nothing on the calendar today. 🌤️</p>`;
  return items.map((c) => {
    const t = clock(toDate(c.start_at));
    const where = c.location ? `<div class="where">${esc(c.location)}</div>` : "";
    return `<div class="item"><div class="time">${t}</div>
      <div class="what">${esc(c.title)}${where}</div></div>`;
  }).join("");
}

async function load() {
  if (!token) { $("#gate").style.display = "flex"; return; }
  $("#status").textContent = "updating…";
  const [outings, briefing] = await Promise.allSettled([api("/outings"), api("/briefing")]);
  if ([outings, briefing].some((r) => r.status === "rejected" && r.reason && r.reason.code === 401)) {
    gate("That code didn't work."); return;
  }
  const name = briefing.status === "fulfilled" ? cap((briefing.value.coaching || {}).user_name || "") : "";
  $("#greeting").textContent = name ? `🏡 ${name}'s day` : "🏡 Today";
  $("#c-now .body").innerHTML = outings.status === "fulfilled"
    ? renderNow(outings.value, name) : `<p class="empty">Couldn't load right now.</p>`;
  $("#c-today .body").innerHTML = briefing.status === "fulfilled"
    ? renderToday(briefing.value) : `<p class="empty">Couldn't load today.</p>`;
  $("#status").textContent = "updated " + new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

function start() { load(); clearInterval(timer); timer = setInterval(load, REFRESH_MS); }

$("#token-save").onclick = () => {
  const v = $("#token-input").value.trim();
  if (!v) return;
  token = v; localStorage.setItem(KEY, v);
  $("#gate").style.display = "none"; $("#gate-err").textContent = "";
  start();
};
$("#token-input").addEventListener("keydown", (e) => { if (e.key === "Enter") $("#token-save").click(); });
document.addEventListener("visibilitychange", () => { if (!document.hidden && token) load(); });

if (token) start(); else $("#gate").style.display = "flex";
</script>
</body>
</html>
