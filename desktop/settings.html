<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prefrontal — Server</title>
    <style>
      :root { color-scheme: light dark; --accent: #5b5bd6; }
      @media (prefers-color-scheme: dark) { :root { --accent: #8b8bf2; } }
      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 1.5rem;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-user-select: none;
      }
      h1 { font-size: 1.1rem; margin: 0 0 0.25rem; }
      p { color: #6b6b70; margin: 0 0 1rem; }
      label { display: block; font-weight: 600; margin-bottom: 0.4rem; }
      input {
        width: 100%; padding: 0.55rem 0.6rem; font-size: 14px;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        border-radius: 8px; background: transparent; color: inherit;
        -webkit-user-select: text;
      }
      input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
      .hint { font-size: 12px; color: #6b6b70; margin-top: 0.4rem; }
      .err { color: #d1453b; font-size: 13px; min-height: 1.2em; margin-top: 0.5rem; }
      .row { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.25rem; }
      button {
        padding: 0.5rem 1rem; font-size: 14px; border-radius: 8px;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        background: transparent; color: inherit; cursor: pointer;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    </style>
  </head>
  <body>
    <h1>Prefrontal server</h1>
    <p>Where is your Prefrontal running? On a laptop, point this at your Mac
      mini's address (Tailscale hostname or LAN IP).</p>

    <label for="url">Server URL</label>
    <input id="url" type="text" placeholder="http://mac-mini.tailnet.ts.net:8000"
           spellcheck="false" autocapitalize="off" />
    <div class="hint">
      Use <code>http://127.0.0.1:8000</code> to run the server on this machine.
    </div>
    <div class="err" id="err"></div>

    <div class="row">
      <button id="cancel">Cancel</button>
      <button id="save" class="primary">Save &amp; Connect</button>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      (async () => { $('url').value = await window.prefrontal.getServerUrl(); $('url').focus(); })();

      async function save() {
        $('err').textContent = '';
        const res = await window.prefrontal.setServerUrl($('url').value);
        if (!res.ok) $('err').textContent = res.error || 'Could not save.';
        // On success the main process closes this window and reconnects.
      }
      $('save').addEventListener('click', save);
      $('cancel').addEventListener('click', () => window.close());
      $('url').addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); });
    </script>
  </body>
</html>
