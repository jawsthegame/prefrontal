name: Prefrontal
options:
  bundleIdPrefix: com.morningstatic
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "" # ← set to your personal team in Xcode (Signing & Capabilities)

targets:
  Prefrontal:
    type: application
    platform: iOS
    sources:
      - path: Prefrontal
    dependencies:
      - target: PrefrontalWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal
        PRODUCT_NAME: Prefrontal
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Prefrontal
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Prefrontal/Prefrontal.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  PrefrontalWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PrefrontalWidgets
      - path: Prefrontal/Config
      - path: Prefrontal/Networking
      - path: Prefrontal/Models
      - path: Prefrontal/Theme
    info:
      path: PrefrontalWidgets/Info.plist
      properties:
        CFBundleDisplayName: Prefrontal
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal.widgets
        PRODUCT_NAME: PrefrontalWidgets
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PrefrontalWidgets/PrefrontalWidgets.entitlements
        SKIP_INSTALL: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
