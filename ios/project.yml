name: Prefrontal
options:
  bundleIdPrefix: com.morningstatic
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"

# Signing team comes from Signing.xcconfig (kept local; see ios/README.md),
# so it survives regeneration and isn't committed to this public repo.
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  Prefrontal:
    type: application
    platform: iOS
    sources:
      - path: Prefrontal
    dependencies:
      - target: PrefrontalWidgets
    # Non-scalar Info.plist keys (the prefrontal:// URL scheme) live here;
    # scalar keys stay as INFOPLIST_KEY_* below and Xcode merges the two.
    # Generated by XcodeGen (git-ignored, like the widget's).
    info:
      path: Prefrontal/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.morningstatic.prefrontal
            CFBundleURLSchemes: [prefrontal]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal
        PRODUCT_NAME: Prefrontal
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Prefrontal
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "Prefrontal scans the QR code on your setup sheet to connect this phone to your server."
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Prefrontal/Prefrontal.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  PrefrontalWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PrefrontalWidgets
      - path: Prefrontal/Config
      - path: Prefrontal/Networking
      - path: Prefrontal/Models
      - path: Prefrontal/Theme
      # Only the widget-button intent — NOT PrefrontalIntents.swift, whose
      # AppShortcutsProvider must be registered by the app target alone.
      - path: Prefrontal/Intents/WidgetActionIntents.swift
    info:
      path: PrefrontalWidgets/Info.plist
      properties:
        CFBundleDisplayName: Prefrontal
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal.widgets
        PRODUCT_NAME: PrefrontalWidgets
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PrefrontalWidgets/PrefrontalWidgets.entitlements
        SKIP_INSTALL: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
