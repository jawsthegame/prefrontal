name: Prefrontal
options:
  bundleIdPrefix: com.morningstatic
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"

# Signing team comes from Signing.xcconfig, which #include?s a git-ignored
# Signing.local.xcconfig holding your Team ID (see ios/README.md) — so it
# survives regeneration + clones and isn't committed to this public repo.
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  Prefrontal:
    type: application
    platform: iOS
    sources:
      - path: Prefrontal
    dependencies:
      - target: PrefrontalWidgets
      # Embed the watchOS companion so installing the phone app installs the
      # watch app too (XcodeGen wires the "Embed Watch Content" copy phase).
      - target: PrefrontalWatch
        embed: true
    # Non-scalar Info.plist keys (the prefrontal:// URL scheme) live here;
    # scalar keys stay as INFOPLIST_KEY_* below and Xcode merges the two.
    # Generated by XcodeGen (git-ignored, like the widget's).
    info:
      path: Prefrontal/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.morningstatic.prefrontal
            CFBundleURLSchemes: [prefrontal]
        # Background App Refresh: drains the offline capture queue + reloads the
        # widget when the app isn't open. Identifier matches refreshTaskID.
        UIBackgroundModes: [fetch]
        BGTaskSchedulerPermittedIdentifiers: [com.morningstatic.prefrontal.refresh]
        # Live Activities (outing/focus countdown on Lock Screen + Dynamic Island).
        NSSupportsLiveActivities: true
        # AlarmKit (iOS 26+) authorization prompt copy — shown once when the user
        # first taps "Set alarm" on the evening morning-prep nudge. Required for
        # AlarmManager.requestAuthorization; harmless on older systems.
        NSAlarmKitUsageDescription: "Prefrontal sets a wake-up alarm when you tap Set alarm on the evening get-ready nudge."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal
        PRODUCT_NAME: Prefrontal
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Prefrontal
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "Prefrontal scans the QR code on your setup sheet to connect this phone to your server."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Prefrontal uses Face ID to unlock the app when you turn on App Lock, keeping your schedule and todos private."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Prefrontal notices when you leave a curated place (like home) to auto-log departures — only if you turn on Location automations."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Prefrontal watches your curated places in the background so leaving home logs a departure without opening the app — only if you turn on Location automations."
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Prefrontal/Prefrontal.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  PrefrontalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PrefrontalTests
    # Hosted by the app target (XcodeGen wires TEST_HOST/BUNDLE_LOADER), so the
    # tests can `@testable import Prefrontal`. Runs on a simulator via
    # `xcodebuild test` — no signing needed for a simulator unit-test bundle.
    dependencies:
      - target: Prefrontal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal.tests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGNING_ALLOWED: "NO"

  PrefrontalWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PrefrontalWidgets
      - path: Prefrontal/Config
      - path: Prefrontal/Networking
      - path: Prefrontal/Models
      - path: Prefrontal/Theme
      # The shared action intents (widget-button + Control Center controls call
      # these). NOT AppShortcuts.swift, whose AppShortcutsProvider must be
      # registered by the app target alone.
      - path: Prefrontal/Intents/WidgetActionIntents.swift
      - path: Prefrontal/Intents/PrefrontalIntents.swift
    info:
      path: PrefrontalWidgets/Info.plist
      properties:
        CFBundleDisplayName: Prefrontal
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal.widgets
        PRODUCT_NAME: PrefrontalWidgets
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PrefrontalWidgets/PrefrontalWidgets.entitlements
        SKIP_INSTALL: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  # The watchOS companion — a thin, glanceable client that relays every request
  # through the paired iPhone (WatchConnectivity), so it holds no token and makes
  # no network calls. Reuses the phone's Models + the shared WatchProtocol; the
  # views are watch-only (no UIKit). See PrefrontalWatch/ and Prefrontal/Watch/.
  PrefrontalWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: PrefrontalWatch
      # Just Models.swift (pure Foundation), NOT the whole Models/ dir —
      # SessionActivity.swift imports ActivityKit, which watchOS lacks.
      - path: Prefrontal/Models/Models.swift
      - path: Prefrontal/Watch/WatchProtocol.swift
    dependencies:
      - target: PrefrontalWatchWidgets
        embed: true
    info:
      path: PrefrontalWatch/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.morningstatic.prefrontal
        CFBundleDisplayName: Prefrontal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal.watchkitapp
        PRODUCT_NAME: Prefrontal
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PrefrontalWatch/PrefrontalWatch.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  # WidgetKit complications for the watch app. Renders from the WatchGlance the
  # watch app caches to the shared App Group — no networking in the extension.
  PrefrontalWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: PrefrontalWatchWidgets
      - path: Prefrontal/Models
      - path: Prefrontal/Watch/WatchProtocol.swift
    info:
      path: PrefrontalWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Prefrontal
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal.watchkitapp.complication
        PRODUCT_NAME: PrefrontalWatchWidgets
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PrefrontalWatchWidgets/PrefrontalWatchWidgets.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        SKIP_INSTALL: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

# An explicit scheme so `xcodebuild -scheme Prefrontal test` can run the unit
# tests headless in CI — Xcode auto-creates schemes only on GUI open, so a
# committed one is needed for the generated (git-ignored) project.
schemes:
  Prefrontal:
    build:
      targets:
        Prefrontal: all
        PrefrontalTests: [test]
    test:
      targets:
        - PrefrontalTests
  # A committed scheme so `xcodebuild -scheme PrefrontalWatch build` works headless
  # (Xcode auto-creates schemes only on GUI open; the project is git-ignored).
  PrefrontalWatch:
    build:
      targets:
        PrefrontalWatch: all
