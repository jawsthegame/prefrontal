name: Prefrontal
options:
  bundleIdPrefix: com.morningstatic
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"

# Signing team comes from Signing.xcconfig, which #include?s a git-ignored
# Signing.local.xcconfig holding your Team ID (see ios/README.md) — so it
# survives regeneration + clones and isn't committed to this public repo.
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  Prefrontal:
    type: application
    platform: iOS
    sources:
      - path: Prefrontal
    dependencies:
      - target: PrefrontalWidgets
    # Non-scalar Info.plist keys (the prefrontal:// URL scheme) live here;
    # scalar keys stay as INFOPLIST_KEY_* below and Xcode merges the two.
    # Generated by XcodeGen (git-ignored, like the widget's).
    info:
      path: Prefrontal/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.morningstatic.prefrontal
            CFBundleURLSchemes: [prefrontal]
        # Background App Refresh: drains the offline capture queue + reloads the
        # widget when the app isn't open. Identifier matches refreshTaskID.
        UIBackgroundModes: [fetch]
        BGTaskSchedulerPermittedIdentifiers: [com.morningstatic.prefrontal.refresh]
        # Live Activities (outing/focus countdown on Lock Screen + Dynamic Island).
        NSSupportsLiveActivities: true
        # AlarmKit (iOS 26+) authorization prompt copy — shown once when the user
        # first taps "Set alarm" on the evening morning-prep nudge. Required for
        # AlarmManager.requestAuthorization; harmless on older systems.
        NSAlarmKitUsageDescription: "Prefrontal sets a wake-up alarm when you tap Set alarm on the evening get-ready nudge."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal
        PRODUCT_NAME: Prefrontal
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Prefrontal
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "Prefrontal scans the QR code on your setup sheet to connect this phone to your server."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Prefrontal uses Face ID to unlock the app when you turn on App Lock, keeping your schedule and todos private."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Prefrontal notices when you leave a curated place (like home) to auto-log departures — only if you turn on Location automations."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Prefrontal watches your curated places in the background so leaving home logs a departure without opening the app — only if you turn on Location automations."
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Prefrontal/Prefrontal.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  PrefrontalWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PrefrontalWidgets
      - path: Prefrontal/Config
      - path: Prefrontal/Networking
      - path: Prefrontal/Models
      - path: Prefrontal/Theme
      # The shared action intents (widget-button + Control Center controls call
      # these). NOT AppShortcuts.swift, whose AppShortcutsProvider must be
      # registered by the app target alone.
      - path: Prefrontal/Intents/WidgetActionIntents.swift
      - path: Prefrontal/Intents/PrefrontalIntents.swift
    info:
      path: PrefrontalWidgets/Info.plist
      properties:
        CFBundleDisplayName: Prefrontal
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morningstatic.prefrontal.widgets
        PRODUCT_NAME: PrefrontalWidgets
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PrefrontalWidgets/PrefrontalWidgets.entitlements
        SKIP_INSTALL: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
